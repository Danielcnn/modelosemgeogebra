 <!DOCTYPE html>
<html lang="pt-BR">




<!-- Estrutura do Popup (Modal) -->
<div id="telegram-popup" class="popup-overlay">
    <div class="popup-content">
        <!-- Botão de fechar (X) -->
        <span class="popup-close" onclick="fecharPopup()">&times;</span>
        
        <!-- Cabeçalho com Ícone Info -->
        <div class="popup-header">
            <span class="info-icon">&#x2139;</span>
            <h2>Fique Conectado com a Gente!</h2>
        </div>
        
        <!-- Texto descritivo -->
        <p>Use o botão abaixo para entrar em nosso grupo oficial no Telegram. Lá você pode ficar por dentro dos novos endereços do site.</p>
        
        <!-- Botão com ícone do Telegram -->
        <a href="https://t.me/+6mkEtNOaaehkM2Ux" target="_blank" class="telegram-btn">
            <!-- Ícone de avião de papel simplificado em SVG -->
            <svg viewBox="0 0 24 24" class="telegram-icon">
                <path d="M21.9,2.1c-0.2-0.1-0.4-0.1-0.6,0l-19,7.2c-0.4,0.2-0.4,0.7-0.1,0.9l4.6,2.3l2.8,6c0.1,0.2,0.3,0.3,0.5,0.3c0.1,0,0.2,0,0.3-0.1l3.2-2.7l4.5,3.3c0.2,0.1,0.4,0.1,0.6-0.1c0.2-0.2,0.2-0.4,0.1-0.6l-4-16.1C22.2,2.5,22.1,2.2,21.9,2.1z M8.9,12.7L18.4,5L10.3,13.6C10,13.9,9.8,14.3,9.7,14.7l-0.5,2.1L8.9,12.7z"/>
            </svg>
        </a>
    </div>
</div>

<style>
/* Estilos do Fundo Escurecido */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.75); /* Escurece o site atrás */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999; /* Garante que fica por cima de tudo */
}

/* Caixa do Popup (Baseada na imagem 1000245828.jpg) */
.popup-content {
    background-color: #111a2e; /* Azul bem escuro de fundo */
    color: #ffffff;
    width: 90%;
    max-width: 420px;
    padding: 30px 24px;
    border-radius: 12px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    text-align: center;
    font-family: sans-serif;
}

/* Botão de Fechar (X) */
.popup-close {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 24px;
    color: #9aa0a6;
    cursor: pointer;
    transition: color 0.2s;
}
.popup-close:hover {
    color: #ffffff;
}

/* Cabeçalho */
.popup-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
}
.info-icon {
    background-color: #0088cc;
    color: white;
    font-size: 16px;
    font-weight: bold;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.popup-header h2 {
    font-size: 19px;
    margin: 0;
    font-weight: 600;
}

/* Texto */
.popup-content p {
    font-size: 14px;
    color: #9ca3af; /* Texto cinza claro */
    line-height: 1.5;
    margin: 0 0 24px 0;
}

/* Botão do Telegram */
.telegram-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #2ea6e6; /* Azul do Telegram */
    padding: 14px;
    border-radius: 8px;
    transition: background-color 0.2s;
    text-decoration: none;
}
.telegram-btn:hover {
    background-color: #1c93d3;
}
.telegram-icon {
    width: 24px;
    height: 24px;
    fill: #ffffff;
}
</style>

<script>
// Função simples para fechar o popup ao clicar no X
function fecharPopup() {
    document.getElementById('telegram-popup').style.display = 'none';
}
</script>
